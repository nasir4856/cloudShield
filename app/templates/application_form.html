<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Protected Application</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    :root {
      --color-primary: #3498db;
      --color-danger: #e74c3c;
      --color-neutral: #ecf0f1;
    }
    body {
      background: linear-gradient(135deg, #000000, #1a1a1a);
      color: var(--color-neutral);
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      padding: 2rem;
    }
    .card {
      background: rgba(20, 20, 20, 0.9);
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      padding: 24px;
      margin-bottom: 24px;
      border: 1px solid rgba(52, 152, 219, 0.4);
    }
    .section-title {
      color: var(--color-neutral);
      font-weight: 700;
      border-bottom: 3px solid var(--color-primary);
      padding-bottom: 12px;
      margin-bottom: 18px;
      text-shadow: 0 0 10px var(--color-primary);
    }
    input, textarea {
      background: #2a2a2a;
      color: var(--color-neutral);
      border: 2px solid #444;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
    }
    label { display: block; margin-bottom: 6px; color: #cbd5e0; }
    .btn-block {
      background-color: var(--color-primary);
      color: white;
      border-radius: 8px;
      padding: 8px 14px;
    }
    .btn-unblock {
      background-color: var(--color-danger);
      color: white;
      border-radius: 8px;
      padding: 8px 14px;
    }
    .status-danger { color: var(--color-danger); }
  </style>
</head>
<body>
  <div class="container mx-auto">
    <h1 class="text-4xl font-bold mb-8 text-center" style="text-shadow: 0 0 10px var(--color-primary);">
      Edit Protected Application
    </h1>
    <div class="text-center mb-8">
      <a href="{{ url_for('admin.applications') }}" class="btn-block inline-block">Protected Applications</a>
    </div>

    {% if errors %}
      <div class="card">
        <h2 class="section-title">Validation Errors</h2>
        <ul>
          {% for error in errors %}
            <li class="status-danger">{{ error }}</li>
          {% endfor %}
        </ul>
      </div>
    {% endif %}

    <div class="card">
      <h2 class="section-title">{{ application.name }}</h2>
      <form method="POST" class="grid md:grid-cols-2 gap-4">
        {{ csrf_field()|safe }}
        <div>
          <label>Name</label>
          <input type="text" name="name" value="{{ application.name }}" required>
        </div>
        <div>
          <label>Public Path</label>
          <input type="text" name="public_path" value="{{ application.public_path }}" required>
        </div>
        <div class="md:col-span-2">
          <label>Upstream URL</label>
          <input type="text" name="upstream_url" value="{{ application.upstream_url }}" required>
        </div>
        <div class="md:col-span-2">
          <label>Description</label>
          <textarea name="description" rows="2">{{ application.description or '' }}</textarea>
        </div>
        <div>
          <label>Rate Limit Per Minute</label>
          <input type="text" name="rate_limit_per_minute" value="{{ application.rate_limit_per_minute }}">
        </div>
        <div>
          <label>Burst Limit</label>
          <input type="text" name="burst_limit" value="{{ application.burst_limit }}">
        </div>
        <label><input type="checkbox" name="enabled" {% if application.enabled %}checked{% endif %} style="width:auto;"> Enabled</label>
        <label><input type="checkbox" name="captcha_enabled" {% if application.captcha_enabled %}checked{% endif %} style="width:auto;"> CAPTCHA Enabled</label>
        <label><input type="checkbox" name="email_alerts" {% if application.email_alerts %}checked{% endif %} style="width:auto;"> Email Alerts</label>
        <div class="md:col-span-2">
          <button type="submit" class="btn-block">Save Changes</button>
          <a href="{{ url_for('admin.applications') }}" class="btn-unblock inline-block ml-2">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
