<article class="soc-card">
  <div class="card-header-row">
    <div>
      <h3>Application Health</h3>
      <p>Current health snapshot from the protected application registry.</p>
    </div>
    <span class="status-pill neutral">Live</span>
  </div>
  <div class="health-grid">
    <div>
      <span>Healthy Apps</span>
      <strong>{{ healthy_apps if healthy_apps is defined else 0 }}</strong>
    </div>
    <div>
      <span>Degraded Apps</span>
      <strong>{{ degraded_apps if degraded_apps is defined else 0 }}</strong>
    </div>
    <div>
      <span>Offline Apps</span>
      <strong>{{ offline_apps if offline_apps is defined else 0 }}</strong>
    </div>
  </div>
</article>
