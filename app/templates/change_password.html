<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    :root { --color-primary:#3498db; --color-danger:#e74c3c; --color-neutral:#ecf0f1; }
    body { background:linear-gradient(135deg,#000,#1a1a1a); color:var(--color-neutral); font-family:Inter,system-ui,sans-serif; padding:2rem; }
    .card { background:rgba(20,20,20,.9); border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,.5); padding:24px; margin-bottom:24px; border:1px solid rgba(52,152,219,.4); }
    .section-title { font-weight:700; border-bottom:3px solid var(--color-primary); padding-bottom:12px; margin-bottom:18px; text-shadow:0 0 10px var(--color-primary); }
    input { background:#2a2a2a; color:var(--color-neutral); border:2px solid #444; width:100%; padding:10px; border-radius:8px; }
    .btn-block { background-color:var(--color-primary); color:white; border-radius:8px; padding:8px 14px; }
    .status-danger { color:var(--color-danger); }
  </style>
</head>
<body>
  <div class="container mx-auto">
    <h1 class="text-4xl font-bold mb-8 text-center" style="text-shadow:0 0 10px var(--color-primary);">Change Password</h1>
    <div class="card">
      {% for error in errors %}<p class="status-danger">{{ error }}</p>{% endfor %}
      <form method="POST">
        {{ csrf_field()|safe }}
        <h2 class="section-title">New Password</h2>
        <input type="password" name="password" required>
        <button class="btn-block mt-4" type="submit">Change Password</button>
      </form>
    </div>
  </div>
</body>
</html>
