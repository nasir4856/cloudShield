<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit User</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    :root { --color-primary:#3498db; --color-danger:#e74c3c; --color-neutral:#ecf0f1; }
    body { background:linear-gradient(135deg,#000,#1a1a1a); color:var(--color-neutral); font-family:Inter,system-ui,sans-serif; padding:2rem; }
    .card { background:rgba(20,20,20,.9); border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,.5); padding:24px; margin-bottom:24px; border:1px solid rgba(52,152,219,.4); }
    .section-title { font-weight:700; border-bottom:3px solid var(--color-primary); padding-bottom:12px; margin-bottom:18px; text-shadow:0 0 10px var(--color-primary); }
    input { background:#2a2a2a; color:var(--color-neutral); border:2px solid #444; width:100%; padding:10px; border-radius:8px; }
    label { display:block; margin-bottom:6px; color:#cbd5e0; }
    .btn-block { background-color:var(--color-primary); color:white; border-radius:8px; padding:8px 14px; }
    .btn-unblock { background-color:var(--color-danger); color:white; border-radius:8px; padding:8px 14px; }
    .status-danger { color:var(--color-danger); }
  </style>
</head>
<body>
  <div class="container mx-auto">
    <h1 class="text-4xl font-bold mb-8 text-center" style="text-shadow:0 0 10px var(--color-primary);">Edit User</h1>
    <div class="text-center mb-8"><a href="{{ url_for('admin.users') }}" class="btn-block inline-block">Users</a></div>
    {% if errors %}
      <div class="card"><h2 class="section-title">Validation Errors</h2>{% for error in errors %}<p class="status-danger">{{ error }}</p>{% endfor %}</div>
    {% endif %}
    <div class="card">
      <h2 class="section-title">{{ managed_user.username }}</h2>
      <form method="POST" class="grid md:grid-cols-2 gap-4">
        {{ csrf_field()|safe }}
        <div><label>Username</label><input name="username" value="{{ managed_user.username }}" required></div>
        <div><label>Email</label><input name="email" value="{{ managed_user.email or '' }}"></div>
        <label><input type="checkbox" name="is_active" {% if managed_user.is_active %}checked{% endif %} style="width:auto;"> Active</label>
        <div class="md:col-span-2">
          <label>Roles</label>
          {% for role in roles %}
            <label><input type="checkbox" name="role_ids" value="{{ role.id }}" {% if role.id in assigned_role_ids %}checked{% endif %} style="width:auto;"> {{ role.name }}</label>
          {% endfor %}
        </div>
        <div class="md:col-span-2">
          <button class="btn-block" type="submit">Save Changes</button>
          <a href="{{ url_for('admin.users') }}" class="btn-unblock inline-block ml-2">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
